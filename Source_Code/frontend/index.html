<!DOCTYPE html>
<html>
<head>
    <title>CMS Dashboard</title>
</head>
<body>
    <h1>Hệ thống CMS Hiện Đại - Đồ án DevOps</h1>
    <p>Trạng thái Backend: <span id="status">Đang kết nối...</span></p>
    <script>
        fetch('http://localhost:8000/api/health') // Trong thực tế sẽ gọi qua Ingress/ALB
            .then(res => res.json())
            .then(data => document.getElementById('status').innerText = data.message)
            .catch(err => document.getElementById('status').innerText = 'Lỗi kết nối API');
    </script>
</body>
</html>
