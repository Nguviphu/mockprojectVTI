stages:
  - test
  - security
  - build
  - update-manifest # Đổi từ deploy trực tiếp sang GitOps

variables:
  DOCKER_REGISTRY: $AWS_ACCOUNT_ID.dkr.ecr.ap-southeast-1.amazonaws.com
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA

# ---------------------------------------------------------
# 1. TEST STAGE: Kiểm tra chất lượng code
# ---------------------------------------------------------
unit_test:
  stage: test
  image: node:18-alpine
  script:
    - echo "Chạy Unit Test cho Backend/Frontend..."
    - cd Source_Code/backend && npm install && npm test || echo "Bỏ qua lỗi test tạm thời"
  allow_failure: true # Trong đồ án cho phép fail để đi tiếp

# ---------------------------------------------------------
# 2. SECURITY STAGE: Quét lỗ hổng bảo mật (DevSecOps)
# ---------------------------------------------------------
sast_scan:
  stage: security
  image: aquasec/trivy:latest
  script:
    - echo "Quét lỗ hổng bảo mật mã nguồn (SAST)..."
    - trivy fs --exit-code 0 --severity HIGH,CRITICAL ./Source_Code
  
# ---------------------------------------------------------
# 3. BUILD STAGE: Đóng gói và đẩy lên AWS ECR
# ---------------------------------------------------------
build_and_push:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  script:
    - echo "Đăng nhập vào AWS ECR..."
    - aws ecr get-login-password --region ap-southeast-1 | docker login --username AWS --password-stdin $DOCKER_REGISTRY
    - echo "Build Image Frontend & Backend..."
    - docker build -t $DOCKER_REGISTRY/cms-frontend:$IMAGE_TAG ./Source_Code/frontend
    - docker build -t $DOCKER_REGISTRY/cms-backend:$IMAGE_TAG ./Source_Code/backend
    - echo "Push Image lên ECR..."
    - docker push $DOCKER_REGISTRY/cms-frontend:$IMAGE_TAG
    - docker push $DOCKER_REGISTRY/cms-backend:$IMAGE_TAG

# ---------------------------------------------------------
# 4. GITOPS STAGE: Cập nhật Manifest cho ArgoCD
# ---------------------------------------------------------
update_gitops_repo:
  stage: update-manifest
  image: alpine:latest
  before_script:
    - apk add --no-cache git yq # Cài công cụ xử lý file yaml
  script:
    - echo "Cập nhật Image Tag mới vào repo K8s Manifest..."
    - git clone https://oauth2:${GITLAB_TOKEN}@gitlab.com/your-username/k8s-manifest-repo.git
    - cd k8s-manifest-repo
    # Dùng yq để sửa tag image tự động trong file yaml
    - yq e -i ".spec.template.spec.containers[0].image = \"$DOCKER_REGISTRY/cms-frontend:$IMAGE_TAG\"" frontend-deployment.yaml
    - yq e -i ".spec.template.spec.containers[0].image = \"$DOCKER_REGISTRY/cms-backend:$IMAGE_TAG\"" backend-deployment.yaml
    - git config user.email "ci-bot@example.com"
    - git config user.name "GitLab CI Bot"
    - git add .
    - git commit -m "Auto-update image tags to $IMAGE_TAG"
    - git push origin main
    - echo "Đã báo cho ArgoCD biết có phiên bản mới!"