name: CI Pipeline - Build & Update Manifest

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Source_Code/frontend/**' 

env:
  AWS_REGION: ap-southeast-1
  ECR_REPO: cms-97-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build and Push Docker Image
      env:
        REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $REGISTRY/$ECR_REPO:$IMAGE_TAG ./Source_Code/frontend
        docker push $REGISTRY/$ECR_REPO:$IMAGE_TAG
        
    - name: Update K8s Manifest for ArgoCD
      env:
        REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        sed -i "s|image: .*$ECR_REPO.*|image: $REGISTRY/$ECR_REPO:$IMAGE_TAG|g" IaC_Code/k8s/frontend-deployment.yaml
        git config user.name "GitHub Actions Bot"
        git config user.email "actions@github.com"
        git add IaC_Code/k8s/frontend-deployment.yaml
        git commit -m "chore: auto-update frontend image tag to $IMAGE_TAG"
        git push